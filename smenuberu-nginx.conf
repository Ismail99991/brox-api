# =========================
# HTTP → HTTPS REDIRECT
# =========================
server {
    listen [::]:80;

    server_name smenube.ru www.smenube.ru
                api.smenube.ru
                app.smenube.ru
                client.smenube.ru
                admin.smenube.ru;

    return 301 https://$host$request_uri;
}

# =========================
# API (PM2 3001)
# =========================
server {
    listen 443 ssl;
    server_name api.smenube.ru;

    ssl_certificate /etc/letsencrypt/live/smenube.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/smenube.ru/privkey.pem;

    location / {
        proxy_pass http://127.0.0.1:3001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# =========================
# APP (3002)
# =========================
server {
    listen 443 ssl;
    server_name app.smenube.ru;

    ssl_certificate /etc/letsencrypt/live/smenube.ru/fullchain.pem;
