}

# -----------------------------------------------------------
# smenube.ru — CLIENT (3003)
# -----------------------------------------------------------
server {
    listen 443 ssl;
    server_name client.smenube.ru;

    ssl_certificate /etc/letsencrypt/live/smenube.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/smenube.ru/privkey.pem;

    location / {
        proxy_pass http://127.0.0.1:3003;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# -----------------------------------------------------------
# smenube.ru — ADMIN (3000)
# -----------------------------------------------------------
server {
    listen 443 ssl;
    server_name admin.smenube.ru;

    ssl_certificate /etc/letsencrypt/live/smenube.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/smenube.ru/privkey.pem;

    location / {
        proxy_pass http://127.0.0.1:3000;

        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# -----------------------------------------------------------
# fareshare.ru (3005)
# -----------------------------------------------------------
server {
    listen 80;
    server_name fareshare.ru www.fareshare.ru;

    location / {
        proxy_pass http://127.0.0.1:3005;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}

# -----------------------------------------------------------
# cockpit.smenube.ru — Cockpit (9090)
# -----------------------------------------------------------
server {
    listen 80;
    server_name cockpit.smenube.ru;

    location / {
        proxy_pass http://127.0.0.1:9090;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_buffering off;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Cookie $http_cookie;
        proxy_pass_request_headers on;
        gzip off;
    }
}