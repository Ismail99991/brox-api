# ============================================================
# Единый конфиг Nginx — все проекты на сервере
# ============================================================

# -----------------------------------------------------------
# brox — ungig.ru (фронтенд + API)
# Диапазон портов: 3010-3019
# -----------------------------------------------------------
server {
    listen 80;
    server_name ungig.ru;

    client_max_body_size 50M;

    root /var/www/brox-web/dist;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /api/ {
        proxy_pass http://localhost:3010/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Authorization $http_authorization;
    }
}

# -----------------------------------------------------------
# smenube.ru — HTTP → HTTPS редирект
# -----------------------------------------------------------
server {
    listen 80;
    server_name smenube.ru www.smenube.ru
                api.smenube.ru
                app.smenube.ru
                client.smenube.ru
                admin.smenube.ru;

    return 301 https://$host$request_uri;
}

# -----------------------------------------------------------
# smenube.ru — API (3001)
# -----------------------------------------------------------
server {
    listen 443 ssl;
    server_name api.smenube.ru;

    ssl_certificate /etc/letsencrypt/live/smenube.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/smenube.ru/privkey.pem;

    location / {
        proxy_pass http://127.0.0.1:3001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# -----------------------------------------------------------
# smenube.ru — APP (3002)
# -----------------------------------------------------------
server {
    listen 443 ssl;
    server_name app.smenube.ru;

